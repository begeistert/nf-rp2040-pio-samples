name: Profile

# nfprof as a CI/CD profiler: on every push it builds each PIO sample fresh and profiles it on the
# emulated RP2040 nanoCLR (no board). The managed-heap breakdown renders in the job summary (so a change
# that grows the heap shows up in the numbers), and a Chrome DevTools heap snapshot + a speedscope flame
# graph are uploaded per sample for the deep dive. The flame graph samples every thread, so a sample that
# Thread.Sleeps reads as wall-clock time waiting in Main — the way dotTrace shows it. Apps are built here,
# never hardcoded.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  nfprof:
    name: nfprof — heap & time across the samples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build each sample fresh and profile it
        run: |
          set -e
          nf() { dotnet profiling/nfprof/nfprof.dll "$@" --firmware profiling/fixture; }
          mkdir -p reports
          {
            echo "# 🔬 nfprof — heap & time across the PIO samples"
            echo "_Built fresh and profiled on every push — a change that grows a sample's heap surfaces"
            echo "in these numbers, so memory regressions show up in review._"
          } >> "$GITHUB_STEP_SUMMARY"

          for s in WS2812 Blink Fade; do
            # Build the sample app — the test kit's target stages its .pe set (mscorlib + lib + app).
            dotnet build "tests/$s.Integration.Tests" -c Release --nologo
            pe="tests/$s.Integration.Tests/bin/Release/net10.0/pe"
            app=(--app-dir "$pe" --app-name "$s.Sample" --until NativeAddProgram)

            {
              echo
              echo "## $s.Sample"
              # --top 40 lists every type (no "other" rollup), so any type's growth is visible.
              nf memory "${app[@]}" --top 40
            } >> "$GITHUB_STEP_SUMMARY"

            nf memory "${app[@]}" --format heapsnapshot --out "reports/$s.heapsnapshot"
            nf calls  "${app[@]}" --instructions 8000000 --format speedscope --out "reports/$s.speedscope.json"
          done

          {
            echo
            echo "## 📂 Interactive reports — download **profiling-reports**"
            echo "Per sample: \`<sample>.heapsnapshot\` → Chrome DevTools › **Memory** (retained sizes, dominators);"
            echo "\`<sample>.speedscope.json\` → **https://speedscope.app** (where each thread spends wall-clock time)."
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v7
        with:
          name: profiling-reports
          path: reports/
