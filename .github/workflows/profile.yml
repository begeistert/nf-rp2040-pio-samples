name: Profile

# nfprof as a CI/CD memory gate: on every push it builds each PIO sample fresh and snapshots its managed
# heap on the emulated RP2040 nanoCLR (no board). The full per-type breakdown renders in the job summary,
# so a change that grows the heap shows up in the numbers — and a Chrome DevTools heap snapshot is
# uploaded per sample for the deep dive. The apps are built here, never hardcoded.
#
# (These samples are I/O-bound — they Thread.Sleep between frames — so there is no managed hot path to
# profile for time; memory is the meaningful metric. CPU-bound code would also get a speedscope flame
# graph via `nfprof calls`.)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  nfprof:
    name: nfprof — managed heap across the samples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build each sample fresh and snapshot its heap
        run: |
          set -e
          nf() { dotnet profiling/nfprof/nfprof.dll "$@" --firmware profiling/fixture; }
          mkdir -p reports
          {
            echo "# 🔬 nfprof — managed heap across the PIO samples"
            echo "_Built fresh and profiled on every push — a change that grows a sample's heap surfaces"
            echo "in these numbers, so memory regressions show up in review._"
          } >> "$GITHUB_STEP_SUMMARY"

          for s in WS2812 Blink Fade; do
            # Build the sample app — the test kit's target stages its .pe set (mscorlib + lib + app).
            dotnet build "tests/$s.Integration.Tests" -c Release --nologo
            pe="tests/$s.Integration.Tests/bin/Release/net10.0/pe"

            {
              echo
              echo "## $s.Sample"
              # --top 40 lists every type (no "other" rollup), so any type's growth is visible.
              nf memory --app-dir "$pe" --app-name "$s.Sample" --until NativeAddProgram --top 40
            } >> "$GITHUB_STEP_SUMMARY"

            nf memory --app-dir "$pe" --app-name "$s.Sample" --until NativeAddProgram \
              --format heapsnapshot --out "reports/$s.heapsnapshot"
          done

          {
            echo
            echo "## 📂 Interactive heap snapshots — download **profiling-reports**"
            echo "Each \`<sample>.heapsnapshot\` → Chrome DevTools › **Memory** › Load — retained sizes, dominator tree, retainers."
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v7
        with:
          name: profiling-reports
          path: reports/
